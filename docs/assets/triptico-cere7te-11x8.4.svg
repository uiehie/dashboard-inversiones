    <text x="36" y="122" fill="#014421" font-family="Segoe UI, Arial, sans-serif" font-size="114" font-weight="900">C7</text>
    <text x="198" y="78" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="92" font-weight="900">Cere7te</text>
    <text x="198" y="168" fill="#dcefe5" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="900">Finacial</text>
    <text x="198" y="232" fill="#d9ebe3" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" letter-spacing="4">DASHBOARD DE INVERSIONES</text>
