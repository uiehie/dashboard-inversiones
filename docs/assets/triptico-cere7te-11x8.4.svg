<svg xmlns="http://www.w3.org/2000/svg" width="11in" height="8.4in" viewBox="0 0 3300 2520" role="img" aria-labelledby="title desc">
  <title id="title">Triptico Cere7te Finacial</title>
  <desc id="desc">Diseno horizontal 11x8.4 en colores de Mexico para Canva.</desc>
  <defs>
    <linearGradient id="mxBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#014421"/>
      <stop offset="50%" stop-color="#0f5c43"/>
      <stop offset="100%" stop-color="#ce1126"/>
    </linearGradient>
    <linearGradient id="panelA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c4a36"/>
      <stop offset="100%" stop-color="#0b3c2d"/>
