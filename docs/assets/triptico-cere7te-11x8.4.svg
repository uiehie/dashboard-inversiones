    <text x="0" y="154" fill="#eaf5ef" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">• Ahorra tiempo en analisis de portafolio.</text>
    <text x="0" y="254" fill="#eaf5ef" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">• Consulta precios y rendimiento al instante.</text>
    <text x="0" y="354" fill="#eaf5ef" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">• Recomendaciones por perfil de riesgo.</text>
    <text x="0" y="454" fill="#eaf5ef" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">• Alertas y calculadora de inversion.</text>
    <text x="0" y="554" fill="#eaf5ef" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="700">• Exporta a JSON, CSV y Excel .xlsx.</text>

