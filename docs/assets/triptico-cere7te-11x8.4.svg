    <linearGradient id="panelB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a6f51"/>
      <stop offset="100%" stop-color="#0e503a"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.17"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.07"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
