    <text x="0" y="116" fill="#e7f2ec" font-family="Segoe UI, Arial, sans-serif" font-size="56" font-weight="700">Plataforma para analizar y mejorar tu portafolio en tiempo real.</text>
    <text x="0" y="218" fill="#d7e9df" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="600">ROI automatico, recomendaciones inteligentes,</text>
    <text x="0" y="286" fill="#d7e9df" font-family="Segoe UI, Arial, sans-serif" font-size="46" font-weight="600">diversificacion por sector, alertas y reportes.</text>
