  <line x1="2160" y1="220" x2="2160" y2="2280" stroke="#ffffff" stroke-opacity="0.3" stroke-dasharray="9 10"/>

  <text x="170" y="170" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">Cere7te Finacial | Triptico 11 x 8.4</text>

