    <text x="380" y="300" text-anchor="middle" fill="#eaf4ef" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">y accionable para nuevos inversionistas.</text>

    <text x="380" y="470" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="58" font-weight="900">Mision</text>
    <text x="380" y="540" text-anchor="middle" fill="#eaf4ef" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">Unificar datos, analitica y decisiones</text>
    <text x="380" y="600" text-anchor="middle" fill="#eaf4ef" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700">de inversion en una sola experiencia.</text>
