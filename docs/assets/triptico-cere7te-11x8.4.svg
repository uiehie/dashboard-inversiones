    <rect x="0" y="75" width="920" height="145" rx="24" fill="url(#chip)" stroke="#ffffff" stroke-opacity="0.35"/>
    <rect x="0" y="245" width="920" height="145" rx="24" fill="url(#chip)" stroke="#ffffff" stroke-opacity="0.35"/>
    <rect x="0" y="415" width="920" height="145" rx="24" fill="url(#chip)" stroke="#ffffff" stroke-opacity="0.35"/>
    <rect x="0" y="585" width="920" height="145" rx="24" fill="url(#chip)" stroke="#ffffff" stroke-opacity="0.35"/>
    <text x="34" y="168" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="800">1) Actualiza recomendaciones semanalmente</text>
    <text x="34" y="338" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="800">2) Diversifica por sector y riesgo</text>
    <text x="34" y="508" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="800">3) Define metas de ROI mensuales</text>
    <text x="34" y="678" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="50" font-weight="800">4) Exporta y compara reportes</text>
